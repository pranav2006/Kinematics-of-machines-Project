<!DOCTYPE html>
<html>
<head>
  <title>Slider Crank Simulator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .slider-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    input[type="range"] {
      width: 100%;
    }

    .value {
      float: right;
      color: #38bdf8;
    }

    canvas {
      background: white;
      border-radius: 10px;
      align-items: center;
    }

    .outputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .output-box {
      background: #0f172a;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #334155;
    }

    .output-box span {
      display: block;
      font-size: 18px;
      color: #22c55e;
    }

    input[type="number"] {
        width: 100%;
        margin-top: 5px;
        padding: 5px;
        border-radius: 5px;
        border: none;
    }

  </style>
</head>

<body>

<h1>Slider Crank Simulator</h1>
<h2>Group 6</h2>

<div class="container">

  <div class="card">

    <div class="slider-group">
      <label>Crank Length r <span id="r_val" class="value"></span></label>
      <input type="range" id="r" min="0.1" max="1" step="0.01" value="0.5">
      <input type="number" id="r_input" min="0.1" max="1" step="0.01" value="0.48">
    </div>

    <div class="slider-group">
      <label>Rod Length l <span id="l_val" class="value"></span></label>
      <input type="range" id="l" min="0" max="2" step="0.01" value="1">
      <input type="number" id="l_input" min="0.5" max="3" step="0.01" value="1.6">
    </div>

    <div class="slider-group">
      <label>Angular Velocity ω <span id="w_val" class="value"></span></label>
      <input type="range" id="w" min="0" max="50" step="1" value="20">
      <input type="number" id="w_input" min="0" max="50" step="1" value="20">
    </div>

    <div class="slider-group">
      <label>Crank Angle θ (deg) <span id="theta_val" class="value"></span></label>
      <input type="range" id="theta" min="0" max="360" step="1" value="60">
      <input type="number" id="theta_input" min="0" max="360" step="1" value="60">
    </div>

    <div class="outputs">
      <div class="output-box">ω₂<span id="w2"></span></div>
      <div class="output-box">α₂<span id="alpha2"></span></div>
      <div class="output-box">vs<span id="vs"></span></div>
      <div class="output-box">as<span id="as"></span></div>
    </div>

  </div>

    <div class="cardcontainer">
        <div class="card">
            <canvas id="chart"></canvas>
            <canvas id="mechanism" width="400" height="250" style="margin-top:20px;"></canvas>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
